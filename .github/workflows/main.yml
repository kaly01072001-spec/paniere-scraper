name: Scraper automatique des prix

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Lancer le scraper
        run: python scraper.py

      - name: Publier les résultats
        run: |
          git config user.name "scraper-bot"
          git config user.email "scraper-bot@users.noreply.github.com"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "Mise à jour automatique des prix"
          git push
